<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: sans-serif;
        background: #f5f5f5;
    }

    #playerContainer {
        width: 368px;
        max-width: 100vw;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 24px;
        box-sizing: border-box;
    }

    #playPauseButton {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: none;
        font-size: 28px;
        cursor: pointer;
    }

    #stopButton {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        border: none;
        font-size: 24px;
        cursor: pointer;
    }

    #fileInput {
        width: 100%;
    }

    #volumeSlider {
        width: 100%;
    }

    .controls {
        display: flex;
        gap: 16px;
        align-items: center;
    }
</style>
</head>
<body>
    <div id="playerContainer">
    <div id="uploadArea">
        <input type="file" id="fileInput" accept="mp3">
    </div>

    <div class="controls">
        <button id="playPauseButton">▶</button>
        <button id="stopButton">■</button>
    </div>


    <div>
        <label for="volumeSlider">音量</label>
        <input
            type="range"
            id="volumeSlider"
            min="0"
            max="1"
            step="0.01"
            value="1"
        />
    </div>

    <script src="player.js"></script>
    </div>
</body>
</html>
